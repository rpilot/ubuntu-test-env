AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Deploys a VPC with a public subnet and an Ubuntu EC2 instance
  accessible via SSH. Applies security group, IMDSv2 enforcement, and EBS encryption.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    Description: Prefix applied to every resource name/tag.

  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC.

  PublicSubnetCIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the public subnet.

  AllowedSSHCIDR:
    Type: String
    Default: 0.0.0.0/0
    Description: >
      CIDR range allowed to reach port 22.
      STRONGLY recommended: replace with your own IP (e.g. 203.0.113.10/32).
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}\/\d{1,2}$
    ConstraintDescription: Must be a valid IPv4 CIDR block (e.g. 203.0.113.10/32).

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small, t3.medium]
    Description: EC2 instance type.

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 key pair for SSH access.

  UbuntuAMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id
    Description: >
      Latest Ubuntu 22.04 LTS AMI resolved automatically via SSM Parameter Store.
      Leave as-is unless you need a specific AMI.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── Networking ────────────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-igw"

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCIDR
      # Auto-assign public IPs so the instance is reachable without an EIP
      MapPublicIpOnLaunch: true
      # Place in the first AZ of the region automatically
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-public-subnet"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-public-rt"

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # ── Security Group ────────────────────────────────────────────────────────

  SSHSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH inbound; all outbound
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSSHCIDR
          Description: SSH access
      # Outbound: allow all (default AWS behaviour, made explicit)
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-ssh-sg"

  # ── IAM Role (SSM Session Manager as a password-free SSH alternative) ────

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-ec2-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # Enables AWS Systems Manager Session Manager (optional SSH-free access)
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-ec2-role"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  # ── EC2 Instance ──────────────────────────────────────────────────────────

  UbuntuInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref UbuntuAMI
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SSHSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile

      # Enforce IMDSv2 (prevents SSRF-based metadata credential theft)
      MetadataOptions:
        HttpTokens: required          # IMDSv2 only
        HttpPutResponseHopLimit: 1    # Prevents container escapes
        HttpEndpoint: enabled

      # Encrypted root volume
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true

      UserData:
        # Runs on first boot: update packages and harden SSH daemon
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail

          # Update all packages
          apt-get update -y
          apt-get upgrade -y

          # Harden SSH: disable root login and password authentication
          sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/'         /etc/ssh/sshd_config
          sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
          sed -i 's/^#\?X11Forwarding.*/X11Forwarding no/'             /etc/ssh/sshd_config

          systemctl restart sshd

          # Install SSM agent (already present on Ubuntu 22.04, but ensure it's running)
          systemctl enable amazon-ssm-agent
          systemctl start  amazon-ssm-agent

      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-ubuntu"

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub "${EnvironmentName}-VpcId"

  PublicSubnetId:
    Description: Public Subnet ID
    Value: !Ref PublicSubnet
    Export:
      Name: !Sub "${EnvironmentName}-PublicSubnetId"

  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref UbuntuInstance

  PublicIP:
    Description: Public IP address of the Ubuntu instance
    Value: !GetAtt UbuntuInstance.PublicIp

  SSHCommand:
    Description: Example SSH command (replace <key.pem> with your key file)
    Value: !Sub "ssh -i <key.pem> ubuntu@${UbuntuInstance.PublicIp}"
